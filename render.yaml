services:
  - type: web
    name: taskmanager-api
    env: node
    buildCommand: "cd ../frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://taskmanager-api.onrender.com
      - key: COOKIE_SECURE
        value: true
